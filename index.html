<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>占いアプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FFF9E6 0%, #F0E6FF 50%, #FFE6F0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255, 179, 217, 0.3), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60px 70px, rgba(216, 191, 216, 0.3), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 50px, rgba(179, 229, 216, 0.3), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, rgba(230, 215, 255, 0.3), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 10px, rgba(255, 184, 163, 0.3), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            pointer-events: none;
            opacity: 0.8;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #FFFBF0 0%, #FFE6F0 50%, #F5E6FF 100%);
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #9B6B9E;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: bold;
        }

        .subtitle {
            color: #A0B4C7;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .fortune-display {
            background: linear-gradient(135deg, #FFB3D9 0%, #D8BFD8 100%);
            color: #FFFFFF;
            padding: 30px;
            border-radius: 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            font-size: 18px;
            line-height: 1.6;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(255, 179, 217, 0.2);
        }

        .fortune-display.hidden {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-fortune {
            background: linear-gradient(135deg, #FFB3D9 0%, #D8BFD8 100%);
            color: white;
            flex: 1;
            min-width: 150px;
            padding: 15px;
            font-size: 16px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .btn-fortune:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255, 179, 217, 0.2);
        }

        .btn-fortune:active {
            transform: translateY(0);
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: sparkleAnimation 0.6s ease-out forwards;
            z-index: 999;
        }

        @keyframes sparkleAnimation {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .category-btn {
            background: #FFF9E6;
            color: #7D5A8A;
            padding: 10px 15px;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .category-btn:hover {
            background: #B3E5D8;
            box-shadow: 0 4px 12px rgba(179, 229, 216, 0.2);
        }

        .category-btn.active {
            background: #D8BFD8;
            color: white;
            box-shadow: 0 4px 12px rgba(216, 191, 216, 0.3);
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .luck-level {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .star {
            font-size: 20px;
            color: #FFD700;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
                border-radius: 24px;
            }

            h1 {
                font-size: 24px;
            }

            .fortune-display {
                font-size: 16px;
                padding: 20px;
                min-height: 100px;
                border-radius: 16px;
            }

            button {
                border-radius: 14px;
            }

            .btn-fortune {
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 分子シャペロン占い 🔬</h1>
        <p class="subtitle">人生のフォールディングをガイドします</p>

        <div class="button-group">
            <button class="category-btn active" data-category="all">全て</button>
            <button class="category-btn" data-category="love">恋愛</button>
            <button class="category-btn" data-category="work">仕事</button>
            <button class="category-btn" data-category="health">健康</button>
            <button class="category-btn" data-category="money">金運</button>
        </div>

        <div class="fortune-display hidden">
            <div>
                <div class="emoji" id="emoji">🔮</div>
                <div id="fortune-text"></div>
                <div class="luck-level" id="luck-level"></div>
            </div>
        </div>

        <button class="btn-fortune">占う</button>
    </div>

    <script>
        const fortunes = {
            all: [
                { text: '完全フォールディング状態\nあなたの人生構造が理想的な形へと完成する予兆。すべての要素が協奏的に機能する。', emoji: '🌟', luck: 5 },
                { text: 'シャペロン助力状態\n周囲のサポートネットワークが最適に機能。正しい方向へのガイダンスを受けている。', emoji: '✨', luck: 4 },
                { text: '緩和フォールディング進行中\nゆっくりとした着実な展開。正しい構造形成のプロセスが進行中。', emoji: '🌙', luck: 3 },
                { text: '品質管理調整期\n微調整が必要な段階。ネットワーク内での位置最適化を図る時期。', emoji: '⭐', luck: 2 },
                { text: '凝集状態・脱凝集待機中\n現在の状態から解放されるまで、落ち着きと観察が必要。再構成のための準備期。', emoji: '☁️', luck: 1 }
            ],
            love: [
                { text: '二分子最適結合状態\n二つの心が理想的に相互作用する。出会いから結合まで、すべての相位が調和する。', emoji: '💕', luck: 5 },
                { text: 'シャペロン相互作用活発\n相手があなたの正しい形へのガイド役となる。心からの思いやりがネットワークを形成。', emoji: '💗', luck: 4 },
                { text: '段階的複合体形成中\n関係が段階を経て深化している。焦らず自然な結合を待つ時期。', emoji: '💞', luck: 3 },
                { text: '相互作用調整局面\nコミュニケーション（分子間対話）を通じた微調整が必要。相手の構造をよく理解する。', emoji: '💘', luck: 2 },
                { text: '一時的凝集・解離準備中\n関係の再構成期。自己フォールディング（自分磨き）で次の結合に備えよ。', emoji: '😔', luck: 1 }
            ],
            work: [
                { text: 'プロジェクト完全フォールディング\nネットワーク内のすべての要素が協奏的に機能。大規模な複合体形成が完成する時。', emoji: '🚀', luck: 5 },
                { text: 'チームシャペロン機能最適化\nチーム内の相互支援ネットワークが高度に機能。信頼という分子間相互作用が結晶化。', emoji: '💼', luck: 4 },
                { text: '段階的タンパク質合成進行\n着実な進行が最適。各段階での品質管理を通じた成長が見られる。', emoji: '📈', luck: 3 },
                { text: 'ネットワーク再構成期\n協力者たちとの相互作用を深化させる重要な局面。個々の役割の最適配置を図れ。', emoji: '🤝', luck: 2 },
                { text: '基礎構造再評価必要\n現在の構造に欠陥がないか検証する準備期。基盤強化なしには上部構造は形成されず。', emoji: '⚠️', luck: 1 }
            ],
            health: [
                { text: '細胞シャペロン活性ピーク\n体内のタンパク質品質管理が完璧に機能。新たな挑戦で細胞活動を活性化させよ。', emoji: '💪', luck: 5 },
                { text: 'HSP（熱ショックプロテイン）充足状態\nストレス対応タンパク質が満たされている。適度な負荷で健全な恒常性を維持せよ。', emoji: '🏃', luck: 4 },
                { text: '緩和フォールディング進行状態\n体内の微調整が進行中。無理なく自然なペースで機能を回復させるとき。', emoji: '🧘', luck: 3 },
                { text: '品質管理メンテナンス優先期\n細胞内の凝集タンパク質除去に注力。十分な睡眠で脱凝集・再フォールディングを促進。', emoji: '😴', luck: 2 },
                { text: '深刻な凝集・脱凝集緊急時\n現在の状態は修復が必要。強制的なメンテナンス（休息）でシステム再起動を図れ。', emoji: '🤒', luck: 1 }
            ],
            money: [
                { text: '資源最適結合状態\n資金配置が理想的に機能。新たな投資・事業形成により複合体価値が最大化する。', emoji: '💰', luck: 5 },
                { text: 'シャペロン資金構造安定\n着実な資金蓄積の仕組みが完成。節約による最適化が効果を発揮する。', emoji: '💵', luck: 4 },
                { text: '段階的資金フォールディング\n無駄なエネルギー損失を避ければ、資金構造が正常に形成される。', emoji: '💳', luck: 3 },
                { text: '資金配置調整局面\n大規模な構造変化は控えるべき時。計画的・段階的な資金移動で安定を保持。', emoji: '💸', luck: 2 },
                { text: '資金凝集・流動性喪失警告\n流動性が失われている状態。浪費を厳格に制限し、貯蓄で再液化を図れ。', emoji: '📉', luck: 1 }
            ]
        };

        let currentCategory = 'all';
        const fortuneDisplay = document.querySelector('.fortune-display');
        const fortuneText = document.getElementById('fortune-text');
        const emojiDisplay = document.getElementById('emoji');
        const luckLevel = document.getElementById('luck-level');
        const fortuneButton = document.querySelector('.btn-fortune');
        const categoryButtons = document.querySelectorAll('.category-btn');

        // カテゴリーボタンのイベントリスナー
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                fortuneDisplay.classList.add('hidden');
            });
        });

        // キラキラ粒子を生成
        function createSparkles(event) {
            const rect = fortuneButton.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const sparkleEmojis = ['✨', '💫', '⭐', '🌟'];

            for (let i = 0; i < 12; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];

                const angle = (i / 12) * Math.PI * 2;
                const distance = 80 + Math.random() * 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                sparkle.style.left = centerX + 'px';
                sparkle.style.top = centerY + 'px';
                sparkle.style.setProperty('--tx', tx + 'px');
                sparkle.style.setProperty('--ty', ty + 'px');

                document.body.appendChild(sparkle);

                setTimeout(() => sparkle.remove(), 600);
            }
        }

        // 占うボタンのイベントリスナー
        fortuneButton.addEventListener('click', () => {
            createSparkles();

            const fortunes_list = fortunes[currentCategory];
            const randomIndex = Math.floor(Math.random() * fortunes_list.length);
            const fortune = fortunes_list[randomIndex];

            emojiDisplay.textContent = fortune.emoji;
            fortuneText.textContent = fortune.text;

            // ラッキースター表示
            luckLevel.innerHTML = '';
            for (let i = 0; i < fortune.luck; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                luckLevel.appendChild(star);
            }

            fortuneDisplay.classList.remove('hidden');

            // アニメーション効果
            fortuneDisplay.style.animation = 'none';
            setTimeout(() => {
                fortuneDisplay.style.animation = 'fadeIn 0.5s ease-in-out';
            }, 10);
        });

        // アニメーション定義
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
